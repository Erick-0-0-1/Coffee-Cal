# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.h2.console.enabled=false

# ─── Gmail SMTP ────────────────────────────────────────────────────────────────
# Set these in Render environment variables:
#   GMAIL_USERNAME  → your full Gmail address  e.g. yourname@gmail.com
#   GMAIL_APP_PASSWORD → 16-char App Password from Google Account > Security > App Passwords
# ─── Gmail SMTP ────────────────────────────────────────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:berick0935@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Set JWT_SECRET in Render environment variables (min 32 characters)
jwt.secret=${JWT_SECRET:please-set-a-strong-secret-in-render-env-vars}
# ✅ FIX: Increased to 24 hours (86400000 ms) so you don't keep getting logged out
jwt.expiration-ms=86400000

# ─── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:https://coffee-cal.vercel.app}

# ─── OAuth2 ────────────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# ─── Scheduling (needed for OTP cache cleanup) ─────────────────────────────────
spring.task.scheduling.enabled=true

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.coffeecalculator=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# ─── Misc ──────────────────────────────────────────────────────────────────────
spring.main.allow-circular-references=true
coffeecalc.business.estimated-monthly-cups=3000